{% extends 'history/base.html' %}
{% block title %}トップ - サッカー日本代表 全試合結果{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-5 fw-bold mb-3">サッカー日本代表 全試合結果</h1>
    <p class="lead text-muted mb-5">
        サッカー日本代表の全試合結果を検索・閲覧できます。
    </p>
    <div class="list-group list-group-flush mx-auto" style="max-width: 400px;">
        <a href="{% url 'history:year_search' %}" class="list-group-item list-group-item-action py-3">
            年度検索
        </a>
        <a href="{% url 'history:country_record' %}" class="list-group-item list-group-item-action py-3">
            国別戦績
        </a>
        <a href="{% url 'history:competition_record' %}" class="list-group-item list-group-item-action py-3">
            大会一覧
        </a>
        {% if user.is_staff %}
        <a href="/admin/" class="list-group-item list-group-item-action py-3">
            管理画面（ログイン）
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
