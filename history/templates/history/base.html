<!DOCTYPE html>
{% load static %}
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}サッカー日本代表 全試合結果{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/history.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'history:top' %}">
                サッカー日本代表 全試合結果
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'history:top' %}">トップ</a>
                <a class="nav-link" href="{% url 'history:year_search' %}">年度検索</a>
                <a class="nav-link" href="{% url 'history:country_record' %}">国別戦績</a>
                <a class="nav-link" href="#">大会一覧</a>
                <a class="nav-link" href="/admin/">管理</a>
            </div>
        </div>
    </nav>
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
